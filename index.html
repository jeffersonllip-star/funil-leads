const url = "https://script.google.com/macros/s/AKfycbxXNhGOVU7Eto8B2MxLx1vb93I4D86Vmc93_l5fdvP7xhJ1A50w9g69Px6xiEBRS2PmgA/exec";

const dados = {

gerente:document.getElementById("gerente").value,

lead:document.getElementById("lead").value,

fase:document.getElementById("fase").value,

situacao:document.getElementById("situacao").value,

data:document.getElementById("data").value,

observacao:document.getElementById("obs").value

};

fetch(url,{

method:"POST",

body:JSON.stringify(dados)

})

.then(res=>res.json())
.then(resposta=>{

alert("Atualização enviada com sucesso!");

document.getElementById("lead").value = "";
document.getElementById("fase").selectedIndex = 0;
document.getElementById("situacao").selectedIndex = 0;
document.getElementById("data").value = "";
document.getElementById("obs").value = "";

});

}

</script>

</body>


</html>
